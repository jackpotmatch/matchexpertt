*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#020617,#111827,#000);
padding:20px;
}

.card{
width:340px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.6);
text-align:center;
color:#fff;
animation:up 1s;
}

.top{
height:120px;
background:linear-gradient(135deg,#FFD700,#ff9800);
}

img{
width:100px;
height:100px;
border-radius:50%;
border:5px solid #fff;
margin-top:-50px;
object-fit:cover;
box-shadow:0 0 25px gold;
}

.badge{
display:inline-block;
margin-top:15px;
padding:8px 18px;
background:#FFD700;
color:#000;
border-radius:30px;
font-size:12px;
font-weight:700;
}

h1{
margin:15px 0 8px;
font-size:28px;
}

p{
color:#ddd;
font-size:14px;
padding:0 20px;
line-height:1.7;
}

.box{
margin:15px 20px;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,.08);
transition:.3s;
}

.box:hover{
background:#FFD700;
color:#000;
transform:translateY(-5px);
}

.btn{
display:block;
margin:20px;
padding:15px;
background:linear-gradient(90deg,#FFD700,#ff9800);
border-radius:12px;
font-weight:800;
text-decoration:none;
color:#000;
font-size:17px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

.footer{
padding:0 20px 20px;
font-size:12px;
color:#aaa;
}

@keyframes up{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>
<body>
